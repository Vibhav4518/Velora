
 {% extends "base.html" %} 

 {% block content %}
 
 <!-- ========================= -->
<!-- Contact Section -->
<!-- ========================= -->

<section class="contact-section py-5">
  <div class="container">
    <div class="text-center mb-5">
      <span class="text-primary fw-semibold"> CONTACT US </span>

      <h2 class="fw-bold mt-2">Get In Touch With Velora</h2>

      <p class="text-muted">
        We'd love to hear from you. Reach out with questions, feedback, or
        partnership inquiries.
      </p>
    </div>

    <div class="row g-4">
      <!-- Contact Info -->

      <div class="col-lg-4">
        <div class="contact-card">
          <i class="bi bi-geo-alt-fill"></i>

          <h5>Address</h5>

          <p>
            123 Velora Street<br />
            New Delhi, India
          </p>
        </div>

        <div class="contact-card mt-4">
          <i class="bi bi-envelope-fill"></i>

          <h5>Email</h5>

          <p>support@velora.com</p>
        </div>

        <div class="contact-card mt-4">
          <i class="bi bi-telephone-fill"></i>

          <h5>Phone</h5>

          <p>+91 98765 43210</p>
        </div>
      </div>

      <!-- Contact Form -->

      <div class="col-lg-8">
        <div class="contact-form">
          <form>
            <div class="row">
              <div class="col-md-6 mb-3">
                <input
                  type="text"
                  class="form-control"
                  placeholder="Your Name"
                  required
                />
              </div>

              <div class="col-md-6 mb-3">
                <input
                  type="email"
                  class="form-control"
                  placeholder="Your Email"
                  required
                />
              </div>
            </div>

            <div class="mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Subject"
                required
              />
            </div>

            <div class="mb-3">
              <textarea
                rows="6"
                class="form-control"
                placeholder="Write your message..."
                required
              >
              </textarea>
            </div>

            <button class="btn btn-primary">Send Message</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Map -->

    <div class="mt-5">
      <iframe
        src="https://maps.google.com/maps?q=New%20Delhi&t=&z=13&ie=UTF8&iwloc=&output=embed"
        width="100%"
        height="400"
        style="border: 0"
        loading="lazy"
      >
      </iframe>
    </div>
  </div>
</section>




 {% endblock %}
